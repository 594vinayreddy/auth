server:
  port: 8082

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  jpa:
      hibernate:
        ddl-auto: create-drop
      show-sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    registerWithEureka: true
    fetchRegistry: true

jwt:
    secret: "myEwalletSuperSecretKeyForJWTSigning2024MustBe256Bits!!"
    expiration: 86400000 # 24 hour in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: "*"
